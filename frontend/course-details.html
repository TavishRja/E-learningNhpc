<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Details - E-Learning</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .details-wrap { max-width:1120px; margin:0 auto; padding:38px 5% 64px; }
    .course-hero { background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:#fff; border-radius:var(--radius); padding:34px; display:grid; grid-template-columns:280px minmax(0,1fr); gap:28px 30px; align-items:start; overflow:hidden; }
    .hero-thumbnail { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:var(--radius); box-shadow:0 12px 28px rgba(0,0,0,.22); min-width:0; }
    .hero-copy { min-width:0; overflow:hidden; }
    .course-hero h1 { min-width:0; font-family:var(--font-display); font-size:2rem; line-height:1.2; margin:8px 0 12px; overflow-wrap:anywhere; }
    .course-description { color:rgba(255,255,255,.82); line-height:1.65; overflow-wrap:anywhere; word-break:break-word; }
    .course-description p,.course-description div { margin:0 0 8px; }
    .hero-meta { font-size:.82rem; color:rgba(255,255,255,.66); }
    .hero-action { grid-column:2; width:min(260px,100%); min-width:0; background:#fff; color:var(--text-dark); border-radius:var(--radius); padding:22px; text-align:center; }
    .hero-action strong { display:block; color:var(--primary); font-size:1.2rem; margin-bottom:14px; }
    .curriculum { margin-top:28px; background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .curriculum-head { padding:22px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:16px; }
    .curriculum-head h2 { font-family:var(--font-display); color:var(--primary); }
    .section-block + .section-block { border-top:1px solid var(--border); }
    .section-name { padding:17px 22px; background:#f7f4ef; font-weight:700; color:var(--primary); display:flex; justify-content:space-between; }
    .lecture-row { padding:14px 24px 14px 34px; display:flex; gap:12px; color:var(--text-mid); border-top:1px solid #f0ece7; }
    .lock { color:var(--text-light); }
    .state { padding:50px 24px; text-align:center; color:var(--text-light); }
    @media (max-width:980px) {
      .course-hero { grid-template-columns:260px minmax(0,1fr); align-items:start; }
    }
    @media (max-width:720px) {
      .course-hero { grid-template-columns:1fr; padding:24px; }
      .hero-action { grid-column:1; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">E-<span>Learning</span></a></div>
    <ul class="nav-links">
      <li><a href="student-dashboard.html">Dashboard</a></li>
      <li><a href="#" id="nav-user" style="color:#fff;font-weight:600;"></a></li>
      <li><a href="#" id="nav-logout" style="color:rgba(255,255,255,.75);">Logout</a></li>
    </ul>
  </nav>

  <main class="details-wrap" id="details-wrap">
    <div class="state">Loading course details...</div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    const courseId = Number(new URLSearchParams(window.location.search).get('courseId'));
    let courseDetails = null;

    document.addEventListener('DOMContentLoaded', loadDetails);
    document.getElementById('nav-user').textContent = getUserName();
    document.getElementById('nav-logout').addEventListener('click', (event) => {
      event.preventDefault();
      logout();
      window.location.href = 'signin.html';
    });

    async function loadDetails() {
      if (!Number.isInteger(courseId) || courseId < 1) return showError('A valid course was not selected.');
      try {
        const headers = getToken() ? { Authorization: `Bearer ${getToken()}` } : {};
        const response = await fetch(`${API_URL}/courses/${courseId}/details`, { headers });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Could not load course details.');
        courseDetails = data;
        renderDetails();
      } catch (error) {
        showError(error.message);
      }
    }

    function renderDetails() {
      const { course, sections, totalLectures } = courseDetails;
      const enrolled = Number(course.is_enrolled) === 1;
      document.title = `${course.title} - E-Learning`;
      document.getElementById('details-wrap').innerHTML = `
        <a href="student-dashboard.html" style="display:inline-block;margin-bottom:18px;color:var(--text-light);">Back to courses</a>
        <section class="course-hero">
          <img class="hero-thumbnail" src="${getCourseImageUrl(course)}" alt="${escapeHtml(course.title)}" onerror="this.src='assets/images/course-placeholder.svg'" />
          <div class="hero-copy">
            <div class="hero-meta">${escapeHtml(course.tutor_name || 'E-Learning Tutor')} | ${totalLectures} lecture${totalLectures === 1 ? '' : 's'}</div>
            <h1>${escapeHtml(course.title)}</h1>
            <div class="course-description">${sanitizeCourseDescriptionHtml(course.description) || 'Course details will be added soon.'}</div>
          </div>
          <div class="hero-action">
            <strong>Free course</strong>
            ${enrolled && course.enrolled_at ? `<p style="font-size:.82rem;color:var(--text-light);margin:-6px 0 14px;">Enrolled this course on ${escapeHtml(formatDate(course.enrolled_at))}</p>` : ''}
            <button class="btn ${enrolled ? 'btn-primary' : 'btn-accent'}" style="width:100%;" onclick="${enrolled ? 'openCourse()' : 'enrollCourse()'}">
              ${enrolled ? 'View Course' : 'Enroll'}
            </button>
          </div>
        </section>
        <section class="curriculum">
          <div class="curriculum-head">
            <h2>Course Content</h2>
            <span>${sections.length} section${sections.length === 1 ? '' : 's'} | ${totalLectures} lecture${totalLectures === 1 ? '' : 's'}</span>
          </div>
          ${sections.length ? sections.map(section => `
            <div class="section-block">
              <div class="section-name">
                <span>${escapeHtml(section.title)}</span>
                <span>${section.lectures.length} lecture${section.lectures.length === 1 ? '' : 's'}</span>
              </div>
              ${section.lectures.map(lecture => `
                <div class="lecture-row"><span class="lock">${enrolled ? 'Lecture' : 'Locked'}</span><span>${escapeHtml(lecture.title)}</span></div>
              `).join('') || '<div class="lecture-row">No lectures in this section yet.</div>'}
            </div>
          `).join('') : '<div class="state">No course sections have been added yet.</div>'}
        </section>
      `;
    }

    async function enrollCourse() {
      if (!isLoggedIn()) {
        window.location.href = 'signin.html';
        return;
      }
      if (getRole() !== 'student') {
        showToast('Student access is required to enroll.', 'error');
        return;
      }
      try {
        const response = await fetch(`${API_URL}/courses/enroll`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
          body: JSON.stringify({ courseId })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Enrollment failed.');
        courseDetails.course.is_enrolled = 1;
        courseDetails.course.enrolled_at = data.enrolled_at || new Date().toISOString();
        showToast(data.message, 'success');
        renderDetails();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    function openCourse() {
      window.location.href = `course-player.html?courseId=${courseId}`;
    }

    function showError(message) {
      document.getElementById('details-wrap').innerHTML = `<div class="state">${escapeHtml(message)}</div>`;
    }

    function escapeHtml(value) {
      const element = document.createElement('div');
      element.textContent = String(value ?? '');
      return element.innerHTML;
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleDateString([], { year:'numeric', month:'short', day:'numeric' });
    }
  </script>
</body>
</html>
