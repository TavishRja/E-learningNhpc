<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Reports - E-Learning</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .reports-wrap { max-width:1400px; margin:0 auto; padding:36px 5% 64px; }
    .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:22px; }
    .page-head h1 { color:var(--primary); font-family:var(--font-display); font-size:1.7rem; }
    .page-head p { color:var(--text-light); margin-top:4px; }
    .admin-nav-active { background:rgba(255,255,255,.14); color:#fff !important; }
    .stats-grid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:16px; }
    .stat-card span { color:var(--text-light); font-size:.76rem; font-weight:700; text-transform:uppercase; }
    .stat-card strong { display:block; color:var(--primary); font-size:1.5rem; margin-top:5px; }
    .activity-panel { background:#fff; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .activity-head { padding:16px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .activity-head h2 { color:var(--primary); font-family:var(--font-display); font-size:1.15rem; }
    .activity-table { width:100%; border-collapse:collapse; font-size:.84rem; }
    .activity-table th,.activity-table td { padding:12px 14px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
    .activity-table th { color:var(--text-light); font-size:.72rem; text-transform:uppercase; background:#faf8f5; }
    .activity-table tr:last-child td { border-bottom:0; }
    .pill { display:inline-flex; padding:3px 8px; border-radius:999px; background:#eef2f7; color:var(--primary); font-size:.72rem; font-weight:700; }
    .empty-state,.error-state { text-align:center; padding:34px 20px; color:var(--text-light); }
    .error-state { color:#9f3434; }
    @media (max-width:1100px) { .stats-grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:720px) { .stats-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } .activity-table { display:block; overflow-x:auto; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="admin-dashboard.html" style="color:inherit;text-decoration:none;">E-<span>Learning</span></a></div>
    <ul class="nav-links">
      <li><a href="admin-dashboard.html">Home</a></li>
      <li><a href="admin-courses.html">Courses</a></li>
      <li><a href="admin-profile.html">Admin</a></li>
      <li><a href="#" id="nav-logout" style="color:rgba(255,255,255,.75);">Logout</a></li>
    </ul>
  </nav>

  <main class="reports-wrap">
    <header class="page-head">
      <div>
        <h1>Transaction Reports</h1>
        <p>Audit summary and latest activity across E-Learning.</p>
      </div>
      <button class="btn btn-outline" type="button" onclick="loadReports()">Refresh</button>
    </header>

    <section class="stats-grid" id="stats-grid"></section>

    <section class="activity-panel">
      <div class="activity-head">
        <h2>Recent Activity</h2>
        <span class="pill">Newest first</span>
      </div>
      <div id="activity-body" class="empty-state">Loading activity...</div>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requireAdmin();
      document.getElementById('nav-logout').addEventListener('click', logoutAdmin);
      loadReports();
    });

    function requireAdmin() {
      if (!isLoggedIn()) {
        window.location.href = 'signin.html';
        return;
      }
      if (getRole() !== 'admin') redirectToDashboard(getRole());
    }

    async function loadReports() {
      const statsGrid = document.getElementById('stats-grid');
      const activityBody = document.getElementById('activity-body');
      statsGrid.innerHTML = '';
      activityBody.className = 'empty-state';
      activityBody.textContent = 'Loading activity...';
      try {
        const response = await fetch(`${API_URL}/courses/admin/reports`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Could not load reports.');
        renderStats(data.summary || {});
        renderActivity(data.recentActivity || []);
      } catch (error) {
        activityBody.className = 'error-state';
        activityBody.textContent = error.message;
      }
    }

    function renderStats(summary) {
      const items = [
        ['Total Students', summary.total_students],
        ['Total Tutors', summary.total_tutors],
        ['Total Courses', summary.total_courses],
        ['Published Courses', summary.total_published_courses],
        ['Enrollments', summary.total_enrollments],
        ['Certificates', summary.total_certificates_generated]
      ];
      document.getElementById('stats-grid').innerHTML = items.map(([label, value]) => `
        <article class="stat-card">
          <span>${escapeCourseText(label)}</span>
          <strong>${Number(value || 0)}</strong>
        </article>
      `).join('');
    }

    function renderActivity(rows) {
      const activityBody = document.getElementById('activity-body');
      if (!rows.length) {
        activityBody.className = 'empty-state';
        activityBody.textContent = 'No transaction activity yet.';
        return;
      }
      activityBody.className = '';
      activityBody.innerHTML = `
        <table class="activity-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Type</th>
              <th>Actor</th>
              <th>Action</th>
              <th>Course</th>
              <th>Status</th>
              <th>Remarks</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td>${escapeCourseText(formatDateTime(row.created_at))}</td>
                <td><span class="pill">${escapeCourseText(row.log_type)}</span></td>
                <td>${escapeCourseText(row.actor_name || `User ${row.actor_id || ''}`)}<br><small>${escapeCourseText(row.actor_role || '')}</small></td>
                <td>${escapeCourseText(row.action)}</td>
                <td>${escapeCourseText(row.course_title || `Course ${row.course_id || ''}`)}</td>
                <td>${escapeCourseText(statusText(row))}</td>
                <td>${escapeCourseText(row.remarks || '')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function statusText(row) {
      if (!row.old_status && !row.new_status) return '';
      return `${row.old_status || '-'} -> ${row.new_status || '-'}`;
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (!value || Number.isNaN(date.getTime())) return '';
      return date.toLocaleString([], { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function logoutAdmin(event) {
      event.preventDefault();
      logout();
      localStorage.removeItem('lh_role');
      window.location.href = 'signin.html';
    }
  </script>
</body>
</html>
