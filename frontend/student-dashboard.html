<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - E-Learning</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .dash-wrap { max-width:1280px; margin:0 auto; padding:32px 4% 56px; }
    .welcome-banner { background:linear-gradient(135deg,var(--primary),var(--primary-light)); border-radius:var(--radius); padding:30px 34px; display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:16px; box-shadow:var(--shadow); }
    .welcome-banner h1 { font-family:var(--font-display); color:#fff; font-size:1.7rem; margin-bottom:5px; }
    .welcome-banner p { color:rgba(255,255,255,.72); font-size:.9rem; }
    .role-badge { background:var(--accent); color:#fff; padding:6px 15px; border-radius:20px; font-size:.78rem; font-weight:700; }
    .section-head { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:16px; }
    .section-title { font-family:var(--font-display); font-size:1.25rem; color:var(--primary); }
    .section-title::after { content:''; display:block; width:38px; height:3px; background:var(--accent); margin-top:5px; border-radius:2px; }
    .section-note { color:var(--text-light); font-size:.82rem; }
    .courses-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:18px; align-items:stretch; margin-bottom:42px; }
    .course-card { height:430px; min-width:0; background:#fff; border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; transition:transform .2s,box-shadow .2s; cursor:pointer; }
    .course-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
    .course-cover { height:135px; flex:0 0 135px; background:var(--primary); position:relative; overflow:hidden; }
    .course-cover img { width:100%; height:100%; object-fit:cover; display:block; }
    .status-pill { position:absolute; top:12px; right:12px; max-width:calc(100% - 24px); background:rgba(20,35,50,.82); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:20px; padding:4px 10px; font-size:.7rem; font-weight:700; text-transform:capitalize; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .course-body { padding:14px; display:flex; flex-direction:column; flex:1; min-width:0; min-height:0; overflow:hidden; }
    .course-badges { max-height:26px; display:flex; flex-wrap:nowrap; gap:6px; margin-bottom:8px; overflow:hidden; }
    .course-badge { max-width:100%; padding:3px 8px; border-radius:4px; background:#f2f7fb; color:var(--primary); font-size:.68rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .course-body h3 { min-width:0; max-height:52px; font-family:var(--font-display); color:var(--primary); font-size:1rem; line-height:1.3; margin-bottom:8px; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; overflow:hidden; overflow-wrap:anywhere; }
    .course-description { max-height:40px; color:var(--text-light); font-size:.78rem; line-height:1.45; margin-bottom:10px; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; overflow:hidden; overflow-wrap:anywhere; }
    .course-meta { max-height:66px; display:grid; gap:4px; padding-top:10px; margin-top:auto; margin-bottom:10px; border-top:1px solid var(--border); color:var(--text-mid); font-size:.72rem; overflow:hidden; }
    .course-meta span { min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .course-progress { flex:0 0 auto; display:grid; gap:6px; margin:0 0 12px; color:var(--text-mid); font-size:.76rem; font-weight:700; overflow:hidden; }
    .course-progress span:first-child { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .course-progress-track { height:7px; border-radius:20px; overflow:hidden; background:#e7edf3; }
    .course-progress-fill { height:100%; background:#1f9d55; border-radius:inherit; }
    .course-action { width:100%; min-height:40px; margin-top:auto; flex:0 0 auto; font-size:.82rem; padding:9px; }
    .empty-state,.loading-state,.error-state { grid-column:1/-1; text-align:center; padding:42px 20px; border:1px dashed var(--border); border-radius:var(--radius); color:var(--text-light); background:#fff; }
    .error-state { color:#9f3434; }
    @media (max-width:1180px) {
      .courses-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
    }
    @media (max-width:860px) {
      .courses-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width:600px) {
      .dash-wrap { padding-left:16px; padding-right:16px; }
      .welcome-banner { padding:24px; }
      .section-head { align-items:flex-start; flex-direction:column; gap:5px; }
      .courses-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">E-Learning</a></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#" id="nav-user" style="color:#fff;font-weight:600;"></a></li>
      <li><a href="#" id="nav-logout" style="color:rgba(255,255,255,.75);">Logout</a></li>
    </ul>
  </nav>

  <main class="dash-wrap">
    <section class="welcome-banner">
      <div>
        <h1 id="welcome-name">Welcome</h1>
        <p id="welcome-email"></p>
      </div>
      <span class="role-badge">Student</span>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">My E-Learning</h2>
        <p class="section-note">Courses you have enrolled in on E-Learning</p>
      </div>
      <div class="courses-grid" id="enrolled-courses">
        <div class="loading-state">Loading your courses...</div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">Explore E-Learning Courses</h2>
        <p class="section-note">Newest published courses appear first</p>
      </div>
      <div class="courses-grid" id="approved-courses">
        <div class="loading-state">Loading published courses...</div>
      </div>
    </section>

  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    const STUDENT_API = `${API_URL}/courses`;

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) {
        window.location.href = 'signin.html';
        return;
      }
      if (getRole() !== 'student') {
        redirectToDashboard(getRole());
        return;
      }

      document.getElementById('welcome-name').textContent = `Welcome, ${getUserName()}`;
      document.getElementById('welcome-email').textContent = localStorage.getItem('lh_user_email') || '';
      document.getElementById('nav-user').textContent = getUserName();
      loadStudentCourses();
    });

    document.getElementById('nav-logout').addEventListener('click', (event) => {
      event.preventDefault();
      logout();
      localStorage.removeItem('lh_role');
      window.location.href = 'signin.html';
    });

    document.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-course-action]');
      const card = event.target.closest('[data-course-id]');
      const courseId = Number(button?.dataset.courseId || card?.dataset.courseId);
      if (!courseId) return;
      const action = button?.dataset.courseAction || card?.dataset.courseAction;
      if (action === 'learn') {
        window.location.href = `course-player.html?courseId=${courseId}`;
        return;
      }
      if (action === 'preview') {
        window.location.href = `course-player.html?courseId=${courseId}&preview=1`;
        return;
      }
      event.preventDefault();
      await enrollFromDashboard(courseId, button || card.querySelector('.course-action'));
    });

    document.addEventListener('keydown', (event) => {
      if (!['Enter', ' '].includes(event.key)) return;
      const card = event.target.closest('[data-course-id]');
      if (!card || event.target.closest('button, a, input, textarea, select')) return;
      const courseId = Number(card.dataset.courseId);
      if (!courseId) return;
      event.preventDefault();
      window.location.href = card.dataset.courseAction === 'learn'
        ? `course-player.html?courseId=${courseId}`
        : `course-player.html?courseId=${courseId}&preview=1`;
    });

    async function loadStudentCourses() {
      try {
        const response = await fetch(`${STUDENT_API}/student`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Could not load courses.');

        const approvedCourses = Array.isArray(data) ? data : [];
        renderCourses(
          'enrolled-courses',
          approvedCourses.filter(course => Number(course.is_enrolled) === 1),
          'You have not enrolled in a course yet.',
          true
        );
        renderCourses(
          'approved-courses',
          approvedCourses.filter(course => Number(course.is_enrolled) !== 1),
          'No more published courses are available to explore.',
          false
        );
      } catch (error) {
        const message = `<div class="error-state">${escapeHtml(error.message)}</div>`;
        document.getElementById('enrolled-courses').innerHTML = message;
        document.getElementById('approved-courses').innerHTML = message;
      }
    }

    function renderCourses(containerId, courses, emptyMessage, learningSection) {
      const container = document.getElementById(containerId);
      if (!courses.length) {
        container.innerHTML = `<div class="empty-state">${escapeHtml(emptyMessage)}</div>`;
        return;
      }

      container.innerHTML = courses.map(course => {
        const enrolled = Number(course.is_enrolled) === 1;
        const chapterCount = Number(course.chapter_count || course.total_chapters || 0);
        const progress = Math.round(Number(course.progress_percent || 0));
        return `
          <article class="course-card" data-course-id="${course.id}" data-course-action="${learningSection ? 'learn' : 'preview'}" tabindex="0">
            <div class="course-cover">
              <img src="${getCourseImageUrl(course)}" alt="${escapeHtml(course.title)}" onerror="this.src='assets/images/course-placeholder.svg'" />
              <span class="status-pill">${escapeHtml(course.status || 'published')}</span>
            </div>
            <div class="course-body">
              <div class="course-badges">
                <span class="course-badge">${chapterCount} lecture${chapterCount === 1 ? '' : 's'}</span>
              </div>
              <h3>${escapeHtml(course.title)}</h3>
              <p class="course-description">${escapeHtml(courseDescriptionText(course.description) || 'Course details will be added soon.')}</p>
              <div class="course-meta">
                <span>${escapeHtml(course.tutor_name || 'E-Learning Tutor')}</span>
                <span>${Number(course.enrollment_count || 0)} student${Number(course.enrollment_count || 0) === 1 ? '' : 's'} enrolled</span>
                ${enrolled && course.enrolled_at ? `<span>Enrolled this course on ${escapeHtml(formatDate(course.enrolled_at))}</span>` : ''}
              </div>
              ${enrolled ? `
                <div class="course-progress">
                  <span>${progress}% complete${progress >= 100 ? ' - Course completed' : ''}</span>
                  <span class="course-progress-track"><span class="course-progress-fill" style="width:${Math.min(progress, 100)}%"></span></span>
                </div>
              ` : ''}
              <button
                class="btn ${enrolled ? 'btn-primary' : 'btn-accent'} course-action"
                data-course-action="${learningSection ? 'learn' : 'enroll'}"
                data-course-id="${course.id}">
                ${enrolled ? (progress > 0 && progress < 100 ? 'Resume Learning' : 'View Course') : 'Enroll'}
              </button>
            </div>
          </article>
        `;
      }).join('');
    }

    async function enrollFromDashboard(courseId, trigger) {
      if (trigger) {
        trigger.disabled = true;
        trigger.textContent = 'Enrolling...';
      }
      try {
        const data = await apiEnroll(courseId);
        if (!data.enrolled) throw new Error(data.message || 'Enrollment failed.');
        showToast(data.message || 'Enrolled successfully!', 'success');
        await loadStudentCourses();
      } catch (error) {
        showToast(error.message || 'Enrollment failed.', 'error');
        if (trigger) {
          trigger.disabled = false;
          trigger.textContent = 'Enroll';
        }
      }
    }

    function escapeHtml(value) {
      const element = document.createElement('div');
      element.textContent = String(value ?? '');
      return element.innerHTML;
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleDateString([], { year:'numeric', month:'short', day:'numeric' });
    }
  </script>
</body>
</html>
