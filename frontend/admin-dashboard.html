<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Home - E-Learning</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .admin-wrap { max-width:1680px; margin:0 auto; padding:36px 5% 64px; }
    .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:22px; }
    .page-head h1 { color:var(--primary); font-family:var(--font-display); font-size:1.7rem; }
    .page-head p { color:var(--text-light); margin-top:4px; }
    .admin-nav-active { background:rgba(255,255,255,.14); color:#fff !important; }
    .courses-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:18px; }
    .course-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; min-height:390px; cursor:pointer; transition:transform .18s, box-shadow .18s; }
    .course-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
    .course-thumb { height:155px; background:#eef2f7; }
    .course-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .course-body { padding:18px; display:flex; flex:1; flex-direction:column; }
    .course-body h2 { color:var(--primary); font-family:var(--font-display); font-size:1.05rem; line-height:1.35; margin-bottom:8px; }
    .course-description { color:var(--text-light); font-size:.82rem; line-height:1.55; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; overflow:hidden; margin-bottom:14px; }
    .course-meta { display:grid; gap:7px; margin-top:auto; padding-top:14px; border-top:1px solid var(--border); color:var(--text-mid); font-size:.78rem; }
    .course-meta strong { color:var(--primary); }
    .course-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .course-actions .btn { padding:8px 12px; font-size:.78rem; }
    .deny-button { color:#b42318; border-color:#b42318; }
    .empty-state,.error-state { text-align:center; padding:46px 20px; border:1px dashed var(--border); border-radius:var(--radius); background:#fff; color:var(--text-light); }
    .error-state { color:#9f3434; }
    @media (max-width:1180px) { .courses-grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:860px) { .courses-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:640px) { .page-head { align-items:flex-start; flex-direction:column; } .courses-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="admin-dashboard.html" style="color:inherit;text-decoration:none;">E-<span>Learning</span></a></div>
    <ul class="nav-links">
      <li><a class="admin-nav-active" href="admin-dashboard.html">Home</a></li>
      <li><a href="admin-courses.html">Courses</a></li>
      <li><a href="admin-profile.html">Admin</a></li>
      <li><a href="#" id="nav-logout" style="color:rgba(255,255,255,.75);">Logout</a></li>
    </ul>
  </nav>

  <main class="admin-wrap">
    <header class="page-head">
      <div>
        <h1>Published Courses</h1>
        <p>Latest published courses appear first.</p>
      </div>
      <a class="btn btn-outline" href="admin-courses.html">Course Review</a>
    </header>
    <section class="courses-grid" id="published-courses">
      <div class="empty-state">Loading published courses...</div>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requireAdmin();
      document.getElementById('nav-logout').addEventListener('click', logoutAdmin);
      loadPublishedCourses();
    });

    function requireAdmin() {
      if (!isLoggedIn()) {
        window.location.href = 'signin.html';
        return;
      }
      if (getRole() !== 'admin') {
        redirectToDashboard(getRole());
      }
    }

    async function loadPublishedCourses() {
      const container = document.getElementById('published-courses');
      try {
        const response = await fetch(`${API_URL}/courses/admin/published`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        });
        const courses = await response.json();
        if (!response.ok) throw new Error(courses.message || 'Could not load published courses.');
        if (!courses.length) {
          container.innerHTML = '<div class="empty-state">No published courses yet.</div>';
          return;
        }
        container.innerHTML = courses.map(course => `
          <article class="course-card" tabindex="0" onclick="openCourse(${course.id})" onkeydown="openCourseFromKey(event, ${course.id})">
            <div class="course-thumb">
              <img src="${getCourseImageUrl(course)}" alt="${escapeCourseText(course.title)}" onerror="this.src='assets/images/course-placeholder.svg'" />
            </div>
            <div class="course-body">
              <h2>${escapeCourseText(course.title)}</h2>
              <p class="course-description">${escapeCourseText(courseDescriptionText(course.description) || 'No description added.')}</p>
              <div class="course-meta">
                <span><strong>Tutor:</strong> ${escapeCourseText(course.tutor_name || 'E-Learning Tutor')}</span>
                <span><strong>Published:</strong> ${escapeCourseText(formatDate(course.approved_at) || 'Date unavailable')}</span>
                <span><strong>Students enrolled:</strong> ${Number(course.enrollment_count || 0)}</span>
                <span><strong>Content:</strong> ${Number(course.section_count || 0)} section${Number(course.section_count || 0) === 1 ? '' : 's'} / ${Number(course.lecture_count || 0)} lecture${Number(course.lecture_count || 0) === 1 ? '' : 's'}</span>
              </div>
            </div>
          </article>
        `).join('');
      } catch (error) {
        container.innerHTML = `<div class="error-state">${escapeCourseText(error.message)}</div>`;
      }
    }

    function logoutAdmin(event) {
      event.preventDefault();
      logout();
      localStorage.removeItem('lh_role');
      window.location.href = 'signin.html';
    }

    function openCourse(courseId) {
      window.location.href = `course-player.html?courseId=${courseId}`;
    }

    function openCourseFromKey(event, courseId) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openCourse(courseId);
      }
    }

    function formatDate(value) {
      const date = new Date(value);
      if (!value || Number.isNaN(date.getTime())) return '';
      return date.toLocaleDateString([], { year:'numeric', month:'short', day:'numeric' });
    }
  </script>
</body>
</html>
