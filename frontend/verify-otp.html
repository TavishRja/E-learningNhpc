<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP - E-Learning</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">E-Learning</a></div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">E-Learning</div>
      <div class="auth-subtitle">Email Verification</div>

      <!-- STEP 1: Enter email and send OTP -->
      <div id="step-email">
        <h2>Verify your Email</h2>
        <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:20px;">
          Enter your organization email — we'll send a 6-digit OTP.
        </p>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="otp-email" placeholder="yourname@gmail.com" />
          <div class="field-error" id="email-error"></div>
        </div>

        <button class="btn btn-primary btn-auth" onclick="sendOTP()">Send OTP</button>
      </div>

      <!-- STEP 2: Enter OTP -->
      <div id="step-otp" style="display:none;">
        <h2>Enter OTP</h2>
        <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:6px;">
          We sent a 6-digit code to <strong id="display-email"></strong>
        </p>
        <p style="font-size:0.8rem; color:var(--text-light); margin-bottom:20px;">
          Expires in <span id="timer" style="color:var(--accent); font-weight:600;">10:00</span>
        </p>

        <!-- OTP boxes -->
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
          <input class="otp-box" type="text" maxlength="1" id="o1" oninput="otpNext(this,'o2')" />
          <input class="otp-box" type="text" maxlength="1" id="o2" oninput="otpNext(this,'o3')" />
          <input class="otp-box" type="text" maxlength="1" id="o3" oninput="otpNext(this,'o4')" />
          <input class="otp-box" type="text" maxlength="1" id="o4" oninput="otpNext(this,'o5')" />
          <input class="otp-box" type="text" maxlength="1" id="o5" oninput="otpNext(this,'o6')" />
          <input class="otp-box" type="text" maxlength="1" id="o6" oninput="otpNext(this,null)" />
        </div>
        <div class="field-error" id="otp-error" style="text-align:center; margin-bottom:12px;"></div>

        <button class="btn btn-accent btn-auth" onclick="verifyOTP()">Verify OTP</button>

        <div style="text-align:center; margin-top:14px; font-size:0.85rem; color:var(--text-light);">
          Didn't receive it?
          <a href="#" onclick="resendOTP()" style="font-weight:600;">Resend OTP</a>
        </div>
      </div>

      <!-- STEP 3: Success -->
      <div id="step-success" style="display:none; text-align:center;">
        <div style="font-size:3rem; margin-bottom:16px;">✅</div>
        <h2 style="color:#2a7a4b;">Email Verified!</h2>
        <p style="color:var(--text-light); margin:10px 0 24px;">
          Your email has been verified successfully.
        </p>
        <a href="index.html" class="btn btn-primary" style="width:100%;">Go to Homepage</a>
      </div>

    </div>
  </div>

  <!-- OTP box styles -->
  <style>
    .otp-box {
      width: 46px;
      height: 54px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--primary);
      outline: none;
      font-family: var(--font-body);
      transition: border-color 0.2s;
    }
    .otp-box:focus {
      border-color: var(--primary-light);
      background: #fff;
    }
  </style>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    const API_URL = 'http://localhost:5000/api';
    let timerInterval = null;

    // Auto-focus next OTP box
    function otpNext(current, nextId) {
      if (current.value.length === 1 && nextId) {
        document.getElementById(nextId).focus();
      }
    }

    // Collect all 6 digits
    function getOTPValue() {
      return ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
    }

    // Start countdown timer
    function startTimer(seconds = 600) {
      clearInterval(timerInterval);
      const timerEl = document.getElementById('timer');
      let remaining = seconds;
      timerInterval = setInterval(() => {
        remaining--;
        const m = Math.floor(remaining / 60).toString().padStart(2, '0');
        const s = (remaining % 60).toString().padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
        if (remaining <= 0) {
          clearInterval(timerInterval);
          timerEl.textContent = 'Expired';
          timerEl.style.color = '#c0392b';
        }
      }, 1000);
    }

    // Send OTP
    async function sendOTP() {
      const email = document.getElementById('otp-email').value.trim();
      const errEl = document.getElementById('email-error');
      errEl.style.display = 'none';

      if (!email) { errEl.textContent = 'Email is required.'; errEl.style.display = 'block'; return; }
      if (!email.endsWith('@gmail.com')) { errEl.textContent = 'Only @gmail.com emails allowed.'; errEl.style.display = 'block'; return; }

      const btn = document.querySelector('#step-email .btn');
      btn.textContent = 'Sending...'; btn.disabled = true;

      const res  = await fetch(`${API_URL}/otp/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      btn.textContent = 'Send OTP'; btn.disabled = false;

      if (data.message === 'OTP sent successfully!') {
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-otp').style.display   = 'block';
        document.getElementById('display-email').textContent = email;
        document.getElementById('o1').focus();
        startTimer(600);
        showToast('OTP sent to your email!', 'success');
      } else {
        errEl.textContent = data.message; errEl.style.display = 'block';
      }
    }

    // Verify OTP
    async function verifyOTP() {
      const email  = document.getElementById('otp-email').value.trim();
      const otp    = getOTPValue();
      const errEl  = document.getElementById('otp-error');
      errEl.style.display = 'none';

      if (otp.length < 6) { errEl.textContent = 'Please enter all 6 digits.'; errEl.style.display = 'block'; return; }

      const btn = document.querySelector('#step-otp .btn-accent');
      btn.textContent = 'Verifying...'; btn.disabled = true;

      const res  = await fetch(`${API_URL}/otp/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await res.json();

      btn.textContent = 'Verify OTP'; btn.disabled = false;

      if (data.message === 'OTP verified successfully!') {
        clearInterval(timerInterval);
        document.getElementById('step-otp').style.display     = 'none';
        document.getElementById('step-success').style.display = 'block';
      } else {
        errEl.textContent = data.message; errEl.style.display = 'block';
      }
    }

    // Resend OTP
    async function resendOTP() {
      const email = document.getElementById('otp-email').value.trim();
      const res   = await fetch(`${API_URL}/otp/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.message === 'OTP sent successfully!') {
        ['o1','o2','o3','o4','o5','o6'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('o1').focus();
        startTimer(600);
        showToast('New OTP sent!', 'success');
      }
    }
  </script>
</body>
</html>
