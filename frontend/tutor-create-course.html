<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Course - E-Learning</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
  <style>
    .page-wrap { max-width:820px; margin:0 auto; padding:40px 5% 64px; }
    .page-head { margin-bottom:22px; }
    .page-head h1 { color:var(--primary); font-family:var(--font-display); font-size:1.7rem; }
    .page-head p { color:var(--text-light); margin-top:5px; }
    .form-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:28px; box-shadow:var(--shadow); }
    #toolbar { border-radius:8px 8px 0 0; background:#f7f4ef; }
    #editor { min-height:180px; border-radius:0 0 8px 8px; background:#fff; }
    .file-box { padding:20px; border:2px dashed var(--border); border-radius:9px; text-align:center; cursor:pointer; color:var(--text-light); }
    .file-box input { display:none; }
    .form-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">E-Learning</a></div>
    <ul class="nav-links">
      <li><a href="tutor-dashboard.html">Home</a></li>
      <li><a href="tutor-courses.html">My Courses</a></li>
      <li><a href="#" id="nav-logout">Logout</a></li>
    </ul>
  </nav>

  <main class="page-wrap">
    <header class="page-head"><h1>Create Course</h1><p>Create the course shell, then add sections and chapters in the preview editor.</p></header>
    <section class="form-card">
      <div class="form-group">
        <label for="course-title">Course Title</label>
        <input id="course-title" type="text" placeholder="e.g. JavaScript for Beginners" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <div id="toolbar">
          <span class="ql-formats"><select class="ql-header"><option selected></option><option value="1"></option><option value="2"></option></select></span>
          <span class="ql-formats"><button class="ql-bold"></button><button class="ql-italic"></button><button class="ql-underline"></button></span>
          <span class="ql-formats"><button class="ql-list" value="ordered"></button><button class="ql-list" value="bullet"></button><button class="ql-link"></button></span>
        </div>
        <div id="editor"></div>
      </div>
      <div class="form-group">
        <label>Course Thumbnail</label>
        <label class="file-box">
          <input id="course-image" type="file" accept="image/jpeg,image/png,image/webp,image/gif" onchange="showImageName()" />
          <span id="image-label">Choose JPG, PNG, WebP, or GIF (max 5MB)</span>
        </label>
      </div>
      <div class="form-actions">
        <a class="btn btn-outline" href="tutor-courses.html">Cancel</a>
        <button class="btn btn-accent" id="create-button" onclick="createCourse()">Create Course</button>
      </div>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script>
    const quill = new Quill('#editor', {
      modules:{ toolbar:'#toolbar' },
      theme:'snow',
      placeholder:'What will students learn?'
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn() || getRole() !== 'tutor') window.location.href = 'signin.html';
    });

    function showImageName() {
      const file = document.getElementById('course-image').files[0];
      document.getElementById('image-label').textContent = file ? file.name : 'Choose JPG, PNG, WebP, or GIF (max 5MB)';
    }

    async function createCourse() {
      const title = document.getElementById('course-title').value.trim();
      const image = document.getElementById('course-image').files[0];
      if (!title) return showToast('Course title is required.', 'error');
      if (!image) return showToast('Course thumbnail is required.', 'error');

      const button = document.getElementById('create-button');
      const formData = new FormData();
      formData.append('title', title);
      formData.append('description', quill.getText().trim() ? quill.getSemanticHTML().trim() : '');
      formData.append('image', image);
      button.disabled = true;
      button.textContent = 'Creating...';
      try {
        const response = await fetch(`${API_URL}/courses/create`, {
          method:'POST',
          headers:{ Authorization:`Bearer ${getToken()}` },
          body:formData
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Could not create course.');
        sessionStorage.setItem('lh_tutor_builder_course_id', String(data.courseId));
        window.location.replace(`course-player.html?courseId=${data.courseId}&edit=1`);
      } catch (error) {
        showToast(error.message, 'error');
        button.disabled = false;
        button.textContent = 'Create Course';
      }
    }
  </script>
</body>
</html>
